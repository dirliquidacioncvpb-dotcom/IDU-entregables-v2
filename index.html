<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Entregables IDU</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:14px;color:#222;background:#f5f5f5}
.app{max-width:1200px;margin:0 auto;padding:1rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:8px;background:#fff;padding:12px 16px;border-radius:10px;border:1px solid #e0e0e0}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:38px;height:38px;background:#185FA5;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0}
.title{font-size:17px;font-weight:700;color:#185FA5}
.subtitle{font-size:11px;color:#666}
.hdr-right{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.btn{padding:6px 14px;border-radius:7px;border:1px solid #ccc;background:#fff;color:#333;font-size:12px;cursor:pointer;font-weight:500}
.btn:hover{background:#f0f0f0}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0C447C}
select.ctl{font-size:12px;padding:5px 8px;border-radius:7px;border:1px solid #ccc;background:#fff;color:#333;cursor:pointer}
.contract-bar{background:#EBF3FB;border-radius:8px;padding:8px 14px;margin-bottom:1rem;display:flex;gap:16px;flex-wrap:wrap;font-size:11px;border:1px solid #B5D4F4}
.contract-bar span{color:#666}
.contract-bar strong{color:#185FA5}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1rem}
.metric{background:#fff;border-radius:8px;padding:10px 14px;border:1px solid #e0e0e0}
.metric-lbl{font-size:10px;color:#888;margin-bottom:3px}
.metric-val{font-size:22px;font-weight:700}
.mv-blue{color:#185FA5}.mv-green{color:#3B6D11}.mv-amber{color:#BA7517}.mv-red{color:#A32D2D}.mv-gray{color:#666}
.stages{display:flex;gap:5px;margin-bottom:.8rem;overflow-x:auto;padding-bottom:4px}
.stab{padding:7px 14px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#666;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-weight:500}
.stab:hover{border-color:#185FA5;color:#185FA5}
.stab.active{background:#185FA5;border-color:#185FA5;color:#fff;font-weight:700}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.prog-bar{flex:1;height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .3s}
.prog-lbl{font-size:11px;color:#666;min-width:40px;text-align:right;font-weight:600}
.filters{display:flex;gap:8px;margin-bottom:.8rem;flex-wrap:wrap;align-items:center;background:#fff;padding:8px 12px;border-radius:8px;border:1px solid #e0e0e0}
.filters label{font-size:11px;color:#666;font-weight:600}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-title{font-size:14px;font-weight:700;color:#185FA5}
.tbl-wrap{border:1px solid #e0e0e0;border-radius:10px;overflow:hidden;margin-bottom:1.2rem;overflow-x:auto;background:#fff}
table{width:100%;border-collapse:collapse;min-width:750px}
th{background:#f0f4f8;font-size:11px;font-weight:700;color:#555;padding:8px 10px;text-align:left;border-bottom:1px solid #e0e0e0}
td{padding:7px 10px;font-size:11px;color:#333;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fbff}
.area-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.area-TECNICA{background:#dbeafe;color:#1e40af}
.area-AMBIENTAL{background:#dcfce7;color:#166534}
.area-SST{background:#fef9c3;color:#854d0e}
.area-FORESTAL{background:#d1fae5;color:#065f46}
.area-CIUDADANO{background:#ede9fe;color:#5b21b6}
.area-ARQUEOLOGIA{background:#fee2e2;color:#991b1b}
.area-PMT{background:#fce7f3;color:#9d174d}
.area-MAQUINARIA{background:#f3f4f6;color:#374151}
.area-CALIDAD{background:#dbeafe;color:#1d4ed8}
.area-BIOTICO{background:#d1fae5;color:#065f46}
.area-GENERAL{background:#f3f4f6;color:#4b5563}
.area-ADMINISTRATIVA{background:#fef3c7;color:#92400e}
select.est-sel{font-size:11px;padding:3px 5px;border-radius:5px;border:1px solid #ccc;background:#fff;cursor:pointer;min-width:95px}
input.fi{font-size:11px;padding:3px 5px;border-radius:5px;border:1px solid #ccc;background:#fff;width:100%}
.av{color:#BA7517;font-size:9px;font-weight:600}.avc{color:#A32D2D;font-size:9px;font-weight:600}
.del-btn{background:none;border:none;cursor:pointer;color:#aaa;font-size:13px;padding:2px 5px;border-radius:4px;font-weight:700}
.del-btn:hover{color:#dc2626;background:#fee2e2}
.group-hdr td{background:#f0f4f8;font-size:11px;font-weight:700;color:#185FA5;padding:6px 10px;border-bottom:1px solid #e0e0e0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:12px;padding:1.5rem;width:460px;max-width:95vw;border:1px solid #e0e0e0;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:1rem;color:#185FA5}
.fg{margin-bottom:10px}
.fg label{font-size:11px;color:#666;display:block;margin-bottom:3px;font-weight:600}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 10px;border-radius:7px;border:1px solid #ccc;font-size:12px;color:#333}
.fg textarea{height:55px;resize:vertical}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.export-btn{background:#27500A;color:#fff;border-color:#27500A}
.export-btn:hover{background:#3B6D11}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="header-left">
    <div class="logo">IDU</div>
    <div><div class="title">Control de Entregables IDU</div><div class="subtitle">Infraestructura Vial · Contratos IDU Bogotá</div></div>
  </div>
  <div class="hdr-right">
    <select class="ctl" id="contractSel" onchange="selContract(this.value)"></select>
    <button class="btn btn-primary" onclick="openNewContract()">+ Contrato</button>
    <button class="btn export-btn" onclick="exportCSV()">&#8595; Exportar CSV</button>
  </div>
</div>

<div class="contract-bar" id="contractBar"></div>
<div class="metrics" id="metrics"></div>
<div class="stages" id="stageTabs"></div>
<div class="prog-row"><div class="prog-bar"><div class="prog-fill" id="progFill"></div></div><div class="prog-lbl" id="progLbl">0%</div></div>

<div class="filters">
  <label>Área:</label>
  <select class="ctl" id="filterArea" onchange="renderTable()"><option value="">Todas</option></select>
  <label style="margin-left:8px">Estado:</label>
  <select class="ctl" id="filterEstado" onchange="renderTable()">
    <option value="">Todos</option>
    <option>Pendiente</option><option>En Revisión</option><option>Radicado</option><option>Aprobado</option><option>Rechazado</option>
  </select>
  <label style="margin-left:8px">Destinatario:</label>
  <select class="ctl" id="filterDest" onchange="renderTable()">
    <option value="">Todos</option>
    <option>Interventoría</option><option>IDU</option><option>Otra Entidad / ESP</option>
  </select>
</div>

<div class="sec-hdr">
  <div class="sec-title" id="stageTitle"></div>
  <button class="btn btn-primary" onclick="openNewEntregable()">+ Entregable</button>
</div>

<div class="tbl-wrap">
<table>
<thead><tr>
  <th style="width:30%">Entregable</th>
  <th style="width:10%">Área</th>
  <th style="width:10%">Destinatario</th>
  <th style="width:13%">Estado</th>
  <th style="width:11%">Fecha límite</th>
  <th style="width:13%">Radicado / Doc.</th>
  <th style="width:10%">Observaciones</th>
  <th style="width:3%"></th>
</tr></thead>
<tbody id="tBody"></tbody>
</table>
</div>
</div>
<div id="modalArea"></div>

const API_URL = 'https://script.google.com/macros/s/AKfycbw14qEGn6vSvul4siOsukATVw51K3jMfeT2LkUsOZvC4BzgLJBGqOwNLdy5yywhpKSi/exec';

let data={contracts:[],cur:null,stage:'pre'};
let saving=false;

async function load(){
  showToast('⏳ Cargando datos desde Google Sheets...', 0);
  try{
    const res = await fetch(API_URL+'?action=read');
    const json = await res.json();
    if(json.contracts && json.contracts.length){
      data.contracts = json.contracts;
    } else {
      addSample();
    }
  }catch(e){
    showToast('⚠️ Sin conexión — cargando datos locales', 3000);
    try{const s=localStorage.getItem('idu_html_v1');if(s){const d=JSON.parse(s);data.contracts=d.contracts||[];}}catch(e2){}
    if(!data.contracts.length)addSample();
  }
  if(!data.cur && data.contracts.length) data.cur=data.contracts[0].id;
  if(!data.stage) data.stage='pre';
  hideToast();
  renderAll();
}

async function save(){
  // Guardar local siempre
  try{localStorage.setItem('idu_html_v1',JSON.stringify(data));}catch(e){}
  // Guardar en Sheets
  if(saving) return;
  saving=true;
  showToast('💾 Guardando en Google Sheets...', 0);
  try{
    await fetch(API_URL, {
      method:'POST',
      body: JSON.stringify({action:'write', data:{contracts:data.contracts}}),
    });
    showToast('✅ Guardado correctamente', 2000);
  }catch(e){
    showToast('⚠️ Error al guardar en Sheets — guardado localmente', 3000);
  }
  saving=false;
}

function showToast(msg, duration){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#185FA5;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.18);transition:opacity .3s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';t.style.display='block';
  if(duration>0) setTimeout(()=>{t.style.opacity='0';},duration);
}
function hideToast(){
  const t=document.getElementById('toast');
  if(t){t.style.opacity='0';}
}
function mkId(){return 'i'+Date.now()+Math.random().toString(36).slice(2,6)}

function addSample(){
  const c={id:'c'+Date.now(),nombre:'Contrato IDU-1810-2021',numero:'1810-2021',tipo:'Construcción nueva vías',valor:'$ 4.500.000.000',fecha_inicio:'2021-10-01',fecha_fin:'2025-04-08',ents:{}};
  STAGES.forEach(st=>{c.ents[st.id]=(BASE[st.id]||[]).map(e=>({id:mkId(),n:e.n,area:e.a,dest:e.d,estado:'Pendiente',fecha:'',doc:'',obs:''}));});
  data.contracts.push(c);data.cur=c.id;
}

function getC(){return data.contracts.find(c=>c.id===data.cur)||data.contracts[0];}

function renderAll(){renderSel();renderBar();renderMetrics();renderTabs();renderTable();}

function renderSel(){
  document.getElementById('contractSel').innerHTML=data.contracts.map(c=>`<option value="${c.id}"${c.id===data.cur?' selected':''}>${c.nombre}</option>`).join('');
}
function renderBar(){
  const c=getC();
  document.getElementById('contractBar').innerHTML=
    `<div><span>Contrato: </span><strong>${c.nombre}</strong></div>
     <div><span>N°: </span><strong>${c.numero||'-'}</strong></div>
     <div><span>Tipo: </span><strong>${c.tipo||'-'}</strong></div>
     <div><span>Valor: </span><strong>${c.valor||'-'}</strong></div>
     <div><span>Inicio: </span><strong>${c.fecha_inicio||'-'}</strong></div>
     <div><span>Fin: </span><strong>${c.fecha_fin||'-'}</strong></div>`;
}
function renderMetrics(){
  const c=getC();
  let tot=0,pend=0,rev=0,rad=0,apr=0,rech=0,venc=0;
  const hoy=new Date();hoy.setHours(0,0,0,0);
  STAGES.forEach(st=>(c.ents[st.id]||[]).forEach(e=>{
    tot++;
    if(e.estado==='Pendiente')pend++;
    else if(e.estado==='En Revisión')rev++;
    else if(e.estado==='Radicado')rad++;
    else if(e.estado==='Aprobado')apr++;
    else if(e.estado==='Rechazado')rech++;
    if(e.fecha&&e.estado!=='Aprobado'&&new Date(e.fecha)<hoy)venc++;
  }));
  const pct=tot?Math.round(apr/tot*100):0;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-lbl">Total entregables</div><div class="metric-val mv-blue">${tot}</div></div>
    <div class="metric"><div class="metric-lbl">Aprobados</div><div class="metric-val mv-green">${apr} <span style="font-size:13px">(${pct}%)</span></div></div>
    <div class="metric"><div class="metric-lbl">Pendientes</div><div class="metric-val mv-gray">${pend}</div></div>
    <div class="metric"><div class="metric-lbl">En revisión</div><div class="metric-val mv-blue">${rev}</div></div>
    <div class="metric"><div class="metric-lbl">Radicados</div><div class="metric-val mv-amber">${rad}</div></div>
    <div class="metric"><div class="metric-lbl">Rechazados</div><div class="metric-val mv-red">${rech}</div></div>
    <div class="metric"><div class="metric-lbl">Vencidos</div><div class="metric-val mv-red">${venc}</div></div>`;
}
function renderTabs(){
  document.getElementById('stageTabs').innerHTML=STAGES.map(s=>
    `<div class="stab${s.id===data.stage?' active':''}" onclick="selStage('${s.id}')">${s.label}</div>`
  ).join('');
}
function renderTable(){
  const c=getC();
  const st=STAGES.find(s=>s.id===data.stage);
  document.getElementById('stageTitle').textContent=st?st.label:'';
  let items=c.ents[data.stage]||[];
  const fa=document.getElementById('filterArea');
  const curArea=fa.value;
  const areas=[...new Set(items.map(e=>e.area))].sort();
  fa.innerHTML='<option value="">Todas</option>'+areas.map(a=>`<option value="${a}"${a===curArea?' selected':''}>${a}</option>`).join('');
  const fArea=fa.value,fEst=document.getElementById('filterEstado').value,fDest=document.getElementById('filterDest').value;
  if(fArea)items=items.filter(e=>e.area===fArea);
  if(fEst)items=items.filter(e=>e.estado===fEst);
  if(fDest)items=items.filter(e=>e.dest===fDest);
  const apr=items.filter(e=>e.estado==='Aprobado').length;
  const pct=items.length?Math.round(apr/items.length*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLbl').textContent=pct+'%';
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const grouped={};
  items.forEach(e=>{if(!grouped[e.area])grouped[e.area]=[];grouped[e.area].push(e);});
  let html='';
  Object.keys(grouped).sort().forEach(area=>{
    html+=`<tr class="group-hdr"><td colspan="8"><span class="area-badge area-${area}">${area}</span> &nbsp;${grouped[area].length} entregables</td></tr>`;
    grouped[area].forEach(e=>{
      let fa2='';
      if(e.fecha&&e.estado!=='Aprobado'){
        const f=new Date(e.fecha);const diff=Math.ceil((f-hoy)/86400000);
        if(diff<0)fa2=`<div class="avc">Vencido ${Math.abs(diff)}d</div>`;
        else if(diff<=7)fa2=`<div class="av">Vence en ${diff}d</div>`;
      }
      html+=`<tr>
        <td>${e.n}</td>
        <td><span class="area-badge area-${e.area}">${e.area}</span></td>
        <td style="font-size:10px">${e.dest}</td>
        <td><select class="est-sel" onchange="upd('${e.id}','estado',this.value)">${ESTADOS.map(s=>`<option${e.estado===s?' selected':''}>${s}</option>`).join('')}</select></td>
        <td><input type="date" class="fi" value="${e.fecha||''}" onchange="upd('${e.id}','fecha',this.value)">${fa2}</td>
        <td><input type="text" class="fi" placeholder="N° radicado" value="${e.doc||''}" onchange="upd('${e.id}','doc',this.value)"></td>
        <td><input type="text" class="fi" placeholder="Obs." value="${e.obs||''}" onchange="upd('${e.id}','obs',this.value)"></td>
        <td><button class="del-btn" onclick="delE('${e.id}')">✕</button></td>
      </tr>`;
    });
  });
  document.getElementById('tBody').innerHTML=html||`<tr><td colspan="8" style="text-align:center;color:#aaa;padding:1.5rem">No hay entregables con los filtros seleccionados</td></tr>`;
}

function upd(id,field,val){
  const c=getC();
  STAGES.forEach(st=>{const e=(c.ents[st.id]||[]).find(x=>x.id===id);if(e)e[field]=val;});
  save();renderMetrics();renderTable();
}
function delE(id){
  if(!confirm('¿Eliminar este entregable?'))return;
  const c=getC();
  STAGES.forEach(st=>{c.ents[st.id]=(c.ents[st.id]||[]).filter(x=>x.id!==id);});
  save();renderMetrics();renderTable();
}
function selContract(id){data.cur=id;data.stage='pre';save();renderAll();}
function selStage(id){data.stage=id;save();renderTabs();renderTable();}

function openNewEntregable(){
  document.getElementById('modalArea').innerHTML=`
  <div class="modal-bg" onclick="cm(event)"><div class="modal">
    <h3>Nuevo entregable</h3>
    <div class="fg"><label>Nombre del entregable</label><input id="nN" type="text" placeholder="Descripción del entregable"></div>
    <div class="fr">
      <div class="fg"><label>Área</label><select id="nA">${AREAS.map(a=>`<option>${a}</option>`).join('')}</select></div>
      <div class="fg"><label>Destinatario</label><select id="nD">${DESTS.map(d=>`<option>${d}</option>`).join('')}</select></div>
    </div>
    <div class="fr">
      <div class="fg"><label>Estado</label><select id="nE">${ESTADOS.map(s=>`<option>${s}</option>`).join('')}</select></div>
      <div class="fg"><label>Fecha límite</label><input id="nF" type="date"></div>
    </div>
    <div class="fr">
      <div class="fg"><label>Radicado / Documento</label><input id="nDoc" type="text" placeholder="N° o nombre"></div>
      <div class="fg"><label>Observaciones</label><input id="nO" type="text" placeholder="Observaciones"></div>
    </div>
    <div class="mf">
      <button class="btn" onclick="cmc()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveE()">Guardar</button>
    </div>
  </div></div>`;
}
function saveE(){
  const n=document.getElementById('nN').value.trim();
  if(!n){alert('Ingresa el nombre del entregable');return;}
  const c=getC();
  if(!c.ents[data.stage])c.ents[data.stage]=[];
  c.ents[data.stage].push({id:mkId(),n,area:document.getElementById('nA').value,dest:document.getElementById('nD').value,estado:document.getElementById('nE').value,fecha:document.getElementById('nF').value,doc:document.getElementById('nDoc').value,obs:document.getElementById('nO').value});
  save();cmc();renderMetrics();renderTable();
}
function openNewContract(){
  document.getElementById('modalArea').innerHTML=`
  <div class="modal-bg" onclick="cm(event)"><div class="modal">
    <h3>Nuevo contrato</h3>
    <div class="fr">
      <div class="fg"><label>Nombre</label><input id="cN" type="text" placeholder="Contrato IDU-002"></div>

    </div>
    <div class="fg"><label>Tipo</label><select id="cT">
      <option>Construcción nueva vías</option><option>Mantenimiento vías</option>
      <option>Mantenimiento espacio público</option><option>Construcción espacio público</option>
      <option>Rehabilitación vial</option>
    </select></div>
    <div class="fg"><label>Valor</label><input id="cV" type="text" placeholder="$ 0.000.000.000"></div>
    <div class="fr">
      <div class="fg"><label>Fecha inicio</label><input id="cI" type="date"></div>
      <div class="fg"><label>Fecha fin</label><input id="cF" type="date"></div>

      <button class="btn" onclick="cmc()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveC()">Crear</button>
    </div>
  </div></div>`;

function saveC(){
  const n=document.getElementById('cN').value.trim();
  if(!n){alert('Ingresa el nombre');return;}
  const c={id:'c'+Date.now(),nombre:n,numero:document.getElementById('cNu').value,tipo:document.getElementById('cT').value,valor:document.getElementById('cV').value,fecha_inicio:document.getElementById('cI').value,fecha_fin:document.getElementById('cF').value,ents:{}};
  STAGES.forEach(st=>{c.ents[st.id]=(BASE[st.id]||[]).map(e=>({id:mkId(),n:e.n,area:e.a,dest:e.d,estado:'Pendiente',fecha:'',doc:'',obs:''}));});
  data.contracts.push(c);data.cur=c.id;data.stage='pre';
  save();cmc();renderAll();
}

function exportCSV(){
  const c=getC();
  let csv='Etapa,Area,Entregable,Destinatario,Estado,Fecha Limite,Radicado/Doc,Observaciones\n';
  STAGES.forEach(st=>{
    (c.ents[st.id]||[]).forEach(e=>{
      const row=[st.label,e.area,`"${e.n}"`,e.dest,e.estado,e.fecha||'',`"${e.doc||''}"`,`"${e.obs||''}"`];
      csv+=row.join(',')+'\n';
    });
  });
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`Entregables_${c.nombre.replace(/\s/g,'_')}.csv`;
  a.click();URL.revokeObjectURL(url);
}

function cm(e){if(e.target.classList.contains('modal-bg'))cmc();}
function cmc(){document.getElementById('modalArea').innerHTML='';}

load();
